<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.06"/></filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafcfc"/><stop offset="100%" stop-color="#f1f4f7"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#42b883"/><stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="760" height="540" rx="12" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="380" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a2e">Vibe Coding vs Context Coding</text>

  <!-- 左列标题 -->
  <rect x="24" y="46" width="348" height="36" rx="8" fill="url(#g1)" filter="url(#sh)"/>
  <text x="198" y="70" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Vibe Coding（共鸣 / 直觉编程）</text>

  <!-- 右列标题 -->
  <rect x="388" y="46" width="348" height="36" rx="8" fill="url(#g2)" filter="url(#sh)"/>
  <text x="562" y="70" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Context Coding（上下文编程）</text>

  <!-- 数据行 -->
  <!-- 起点 -->
  <rect x="24" y="90" width="348" height="48" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="388" y="90" width="348" height="48" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="109" font-size="11" font-weight="700" fill="#2d8a5e">🧭 起点</text>
  <text x="40" y="126" font-size="10" fill="#555">模糊的想法、感觉、灵感</text>
  <text x="404" y="109" font-size="11" font-weight="700" fill="#2563eb">🧭 起点</text>
  <text x="404" y="126" font-size="10" fill="#555">精确的需求、设计、架构文档</text>

  <!-- 过程 -->
  <rect x="24" y="142" width="348" height="48" rx="6" fill="#f0fdf4" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="388" y="142" width="348" height="48" rx="6" fill="#eff6ff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="161" font-size="11" font-weight="700" fill="#2d8a5e">🔄 过程</text>
  <text x="40" y="178" font-size="10" fill="#555">试错、探索、不断调整提示词</text>
  <text x="404" y="161" font-size="11" font-weight="700" fill="#2563eb">🔄 过程</text>
  <text x="404" y="178" font-size="10" fill="#555">严格遵循上下文规则、按计划执行</text>

  <!-- AI 角色 -->
  <rect x="24" y="194" width="348" height="48" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="388" y="194" width="348" height="48" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="213" font-size="11" font-weight="700" fill="#2d8a5e">🤖 AI 角色</text>
  <text x="40" y="230" font-size="10" fill="#555">创意合伙人：提供灵感，出乎意料的好方案</text>
  <text x="404" y="213" font-size="11" font-weight="700" fill="#2563eb">🤖 AI 角色</text>
  <text x="404" y="230" font-size="10" fill="#555">高级执行者：理解项目全貌，准确按要求执行</text>

  <!-- 开发者精力 -->
  <rect x="24" y="246" width="348" height="48" rx="6" fill="#f0fdf4" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="388" y="246" width="348" height="48" rx="6" fill="#eff6ff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="265" font-size="11" font-weight="700" fill="#2d8a5e">🎯 开发者精力</text>
  <text x="40" y="282" font-size="10" fill="#555">集中在"我要什么感觉/效果"</text>
  <text x="404" y="265" font-size="11" font-weight="700" fill="#2563eb">🎯 开发者精力</text>
  <text x="404" y="282" font-size="10" fill="#555">集中在"我要什么结构/规则"</text>

  <!-- 产出质量 -->
  <rect x="24" y="298" width="348" height="48" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="388" y="298" width="348" height="48" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="317" font-size="11" font-weight="700" fill="#2d8a5e">⭐ 产出质量</text>
  <text x="40" y="334" font-size="10" fill="#555">有惊喜，但可能有隐藏问题或风格不一致</text>
  <text x="404" y="317" font-size="11" font-weight="700" fill="#2563eb">⭐ 产出质量</text>
  <text x="404" y="334" font-size="10" fill="#555">稳定、可预测、质量统一</text>

  <!-- 文档依赖 -->
  <rect x="24" y="350" width="348" height="48" rx="6" fill="#f0fdf4" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="388" y="350" width="348" height="48" rx="6" fill="#eff6ff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="369" font-size="11" font-weight="700" fill="#2d8a5e">📄 文档依赖</text>
  <text x="40" y="386" font-size="10" fill="#555">低 — 主要依赖即时对话和历史记录</text>
  <text x="404" y="369" font-size="11" font-weight="700" fill="#2563eb">📄 文档依赖</text>
  <text x="404" y="386" font-size="10" fill="#555">高 — 核心依赖 CLAUDE.md + README + 架构图</text>

  <!-- 学习曲线 -->
  <rect x="24" y="402" width="348" height="48" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="388" y="402" width="348" height="48" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="421" font-size="11" font-weight="700" fill="#2d8a5e">📈 学习曲线</text>
  <text x="40" y="438" font-size="10" fill="#555">低 — 上手快，有趣</text>
  <text x="404" y="421" font-size="11" font-weight="700" fill="#2563eb">📈 学习曲线</text>
  <text x="404" y="438" font-size="10" fill="#555">高 — 需学习如何构建和维护有效上下文</text>

  <!-- 失败风险 -->
  <rect x="24" y="454" width="348" height="48" rx="6" fill="#f0fdf4" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="388" y="454" width="348" height="48" rx="6" fill="#eff6ff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="473" font-size="11" font-weight="700" fill="#2d8a5e">⚠️ 失败风险</text>
  <text x="40" y="490" font-size="10" fill="#555">容易跑偏，出现难以维护的"屎山"代码</text>
  <text x="404" y="473" font-size="11" font-weight="700" fill="#2563eb">⚠️ 失败风险</text>
  <text x="404" y="490" font-size="10" fill="#555">上下文不足/过时会导致生成僵硬或错误代码</text>

  <!-- 底部提示 -->
  <rect x="190" y="514" width="380" height="18" rx="9" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="380" y="527" text-anchor="middle" font-size="10" fill="#64748b">实践最佳策略：搭建阶段用 Vibe，打磨阶段用 Context</text>
</svg>