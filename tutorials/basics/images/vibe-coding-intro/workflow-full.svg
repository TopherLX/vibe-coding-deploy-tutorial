<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 250" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="plan" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#42b883"/><stop offset="100%" stop-color="#38a06c"/></linearGradient>
    <linearGradient id="build" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="verify" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
    <linearGradient id="reset" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>

  <!-- Title -->
  <text x="480" y="22" text-anchor="middle" font-size="13" fill="#aaa" font-weight="600" letter-spacing="2">理 想 实 战 工 作 流 循 环</text>

  <!-- ===== PHASE 1: PLAN ===== -->
  <rect x="20" y="36" width="210" height="130" rx="10" fill="#42b883" fill-opacity="0.04" stroke="#42b883" stroke-width="1" stroke-dasharray="4 3" stroke-opacity="0.3"/>
  <rect x="20" y="36" width="210" height="26" rx="10" fill="url(#plan)" fill-opacity="0.12"/>
  <text x="125" y="54" text-anchor="middle" font-size="11" font-weight="700" fill="#2e8b5e">PLAN · 规划阶段</text>

  <!-- Step 1 -->
  <rect x="28" y="70" width="92" height="58" rx="8" fill="#fff" stroke="#42b883" stroke-width="1.8" filter="url(#sh)"/>
  <circle cx="46" cy="88" r="9" fill="#42b883"/>
  <text x="46" y="92" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">1</text>
  <text x="61" y="91" font-size="11.5" font-weight="700" fill="#333">读上下文</text>
  <text x="74" y="110" text-anchor="middle" font-size="8.5" fill="#999">阅读项目 → 梳理结构</text>
  <text x="74" y="122" text-anchor="middle" font-size="8" fill="#ccc">Owner: Dev + Agent</text>

  <!-- Step 2 -->
  <rect x="130" y="70" width="92" height="58" rx="8" fill="#fff" stroke="#42b883" stroke-width="1.8" filter="url(#sh)"/>
  <circle cx="148" cy="88" r="9" fill="#42b883"/>
  <text x="148" y="92" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">2</text>
  <text x="163" y="91" font-size="11.5" font-weight="700" fill="#333">写计划</text>
  <text x="176" y="110" text-anchor="middle" font-size="8.5" fill="#999">拆解任务 → 评估风险</text>
  <text x="176" y="122" text-anchor="middle" font-size="8" fill="#ccc">Owner: Agent → Dev</text>

  <!-- Arrow PLAN → BUILD -->
  <line x1="236" y1="99" x2="254" y2="99" stroke="#42b883" stroke-width="1.2" stroke-opacity="0.4"/>
  <polygon points="254,95 262,99 254,103" fill="#42b883" opacity="0.4"/>

  <!-- ===== PHASE 2: BUILD ===== -->
  <rect x="268" y="36" width="270" height="130" rx="10" fill="#3b82f6" fill-opacity="0.04" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 3" stroke-opacity="0.3"/>
  <rect x="268" y="36" width="270" height="26" rx="10" fill="url(#build)" fill-opacity="0.12"/>
  <text x="403" y="54" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">BUILD · 构建阶段</text>

  <!-- Step 3 -->
  <rect x="278" y="70" width="120" height="58" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#sh)"/>
  <circle cx="296" cy="88" r="9" fill="#3b82f6"/>
  <text x="296" y="92" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">3</text>
  <text x="311" y="91" font-size="11.5" font-weight="700" fill="#333">确认范围</text>
  <text x="338" y="110" text-anchor="middle" font-size="8.5" fill="#999">对齐预期 → 明确边界</text>
  <text x="338" y="122" text-anchor="middle" font-size="8" fill="#ccc">Owner: Dev 确认</text>

  <!-- Step 4 -->
  <rect x="408" y="70" width="120" height="58" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#sh)"/>
  <circle cx="426" cy="88" r="9" fill="#3b82f6"/>
  <text x="426" y="92" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">4</text>
  <text x="441" y="91" font-size="11.5" font-weight="700" fill="#333">小步实现</text>
  <text x="468" y="110" text-anchor="middle" font-size="8.5" fill="#999">最小改动 → 单文件聚焦</text>
  <text x="468" y="122" text-anchor="middle" font-size="8" fill="#ccc">Owner: Agent 执行</text>

  <!-- Arrow BUILD → VERIFY -->
  <line x1="544" y1="99" x2="562" y2="99" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.4"/>
  <polygon points="562,95 570,99 562,103" fill="#f59e0b" opacity="0.4"/>

  <!-- ===== PHASE 3: VERIFY ===== -->
  <rect x="576" y="36" width="190" height="130" rx="10" fill="#f59e0b" fill-opacity="0.04" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3" stroke-opacity="0.3"/>
  <rect x="576" y="36" width="190" height="26" rx="10" fill="url(#verify)" fill-opacity="0.12"/>
  <text x="671" y="54" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">VERIFY · 验证</text>

  <!-- Step 5 -->
  <rect x="584" y="70" width="174" height="48" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/>
  <circle cx="602" cy="86" r="9" fill="#f59e0b"/>
  <text x="602" y="90" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">5</text>
  <text x="617" y="89" font-size="11.5" font-weight="700" fill="#333">跑验证</text>
  <text x="671" y="106" text-anchor="middle" font-size="8.5" fill="#999">运行测试 → 人工确认</text>

  <!-- Step 6 -->
  <rect x="584" y="124" width="174" height="28" rx="6" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 2" stroke-opacity="0.3"/>
  <text x="671" y="133" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">⑥ 总结结果</text>
  <text x="671" y="146" text-anchor="middle" font-size="8" fill="#999">变更清单 + 状态</text>

  <!-- Arrow VERIFY → RESET -->
  <line x1="772" y1="99" x2="788" y2="99" stroke="#8b5cf6" stroke-width="1.2" stroke-opacity="0.4"/>
  <polygon points="788,95 796,99 788,103" fill="#8b5cf6" opacity="0.4"/>

  <!-- ===== PHASE 4: RESET ===== -->
  <rect x="802" y="36" width="138" height="130" rx="10" fill="#8b5cf6" fill-opacity="0.04" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4 3" stroke-opacity="0.3"/>
  <rect x="802" y="36" width="138" height="26" rx="10" fill="url(#reset)" fill-opacity="0.12"/>
  <text x="871" y="54" text-anchor="middle" font-size="11" font-weight="700" fill="#6d28d9">RESET</text>

  <!-- Step 7 -->
  <rect x="812" y="70" width="118" height="58" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#sh)"/>
  <circle cx="830" cy="88" r="9" fill="#8b5cf6"/>
  <text x="830" y="92" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">7</text>
  <text x="845" y="91" font-size="11.5" font-weight="700" fill="#333">/new</text>
  <text x="871" y="110" text-anchor="middle" font-size="8.5" fill="#999">开新会话</text>

  <!-- ===== RETURN LOOP ===== -->
  <path d="M 940 166 Q 970 166 970 101 Q 970 36 940 36" fill="none" stroke="#8b5cf6" stroke-width="1.3" stroke-dasharray="5 4" opacity="0.25"/>
  <path d="M 940 36 Q 940 16 480 16 Q 20 16 20 36" fill="none" stroke="#42b883" stroke-width="1.3" stroke-dasharray="5 4" opacity="0.25"/>
  <text x="480" y="14" text-anchor="middle" font-size="9" fill="#8b5cf6" opacity="0.4">下一轮迭代</text>

  <!-- ===== LEGEND ===== -->
  <rect x="20" y="192" width="920" height="30" rx="6" fill="none"/>
  <rect x="30" y="198" width="10" height="10" rx="2" fill="#42b883" opacity="0.5"/><text x="44" y="208" font-size="8.5" fill="#888">Dev + Agent 协作</text>
  <rect x="160" y="198" width="10" height="10" rx="2" fill="#3b82f6" opacity="0.5"/><text x="174" y="208" font-size="8.5" fill="#888">Agent 主导执行</text>
  <rect x="290" y="198" width="10" height="10" rx="2" fill="#f59e0b" opacity="0.5"/><text x="304" y="208" font-size="8.5" fill="#888">Dev 主导验证</text>
  <rect x="410" y="198" width="10" height="10" rx="2" fill="#8b5cf6" opacity="0.5"/><text x="424" y="208" font-size="8.5" fill="#888">Dev 重置上下文</text>
  <text x="620" y="208" font-size="8.5" fill="#bbb">每个任务完成后必须 /new，避免旧假设污染新任务</text>
</svg>
