<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="gradBar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42b883"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="forget2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <text x="360" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">上下文窗口：AI 的短期记忆</text>
  <rect x="140" y="48" width="14" height="14" rx="3" fill="url(#gradBar2)"/><text x="160" y="60" font-size="12" fill="#555">上下文窗口（1M tokens）</text>
  <rect x="340" y="48" width="14" height="14" rx="3" fill="url(#forget2)"/><text x="360" y="60" font-size="12" fill="#555">超出窗口，被遗忘</text>
  <rect x="40" y="80" width="640" height="36" rx="6" fill="url(#gradBar2)" opacity="0.12" stroke="#42b883" stroke-width="1.5"/>
  <text x="360" y="103" text-anchor="middle" font-size="11" fill="#42b883" font-weight="600">1M Token 上下文窗口 ≈ 可装下《三体》三部曲全部内容</text>
  <rect x="40" y="140" width="120" height="50" rx="6" fill="#42b883" opacity="0.15" stroke="#42b883" stroke-width="1"/><text x="100" y="162" text-anchor="middle" font-size="11" fill="#2d8a5e" font-weight="600">Prompt #100</text><text x="100" y="178" text-anchor="middle" font-size="9" fill="#666">✓ 模型记得</text>
  <rect x="170" y="140" width="120" height="50" rx="6" fill="#42b883" opacity="0.12" stroke="#42b883" stroke-width="1"/><text x="230" y="162" text-anchor="middle" font-size="11" font-weight="600">Prompt #75</text><text x="230" y="178" text-anchor="middle" font-size="9" fill="#52a97a">✓ 记得</text>
  <rect x="300" y="140" width="120" height="50" rx="6" fill="#42b883" opacity="0.08" stroke="#42b883" stroke-width="1"/><text x="360" y="162" text-anchor="middle" font-size="11" fill="#888">Prompt #50</text><text x="360" y="178" text-anchor="middle" font-size="9" fill="#999">⚠ 模糊</text>
  <rect x="430" y="140" width="120" height="50" rx="6" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="1"/><text x="490" y="162" text-anchor="middle" font-size="11" fill="#999">Prompt #25</text><text x="490" y="178" text-anchor="middle" font-size="9" fill="#b88a20">⚠ 注意力低</text>
  <rect x="560" y="140" width="120" height="50" rx="6" fill="url(#forget2)" opacity="0.5" stroke="#ef4444" stroke-width="1" stroke-dasharray="4"/><text x="620" y="162" text-anchor="middle" font-size="11" fill="#999">Prompt #1</text><text x="620" y="178" text-anchor="middle" font-size="9" fill="#ef4444">✗ 已遗忘</text>
  <text x="360" y="225" text-anchor="middle" font-size="12" fill="#888">← 新消息                                                                                       旧消息 →</text>
  <rect x="40" y="250" width="300" height="110" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/><text x="190" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#b88a20">⚠ 注意力衰减</text><text x="60" y="300" font-size="12" fill="#8b6914">对话越长，模型对早期信息的注意力越分散</text><text x="60" y="322" font-size="12" fill="#8b6914">就像读完一本书，开头细节不如刚读时清晰</text>
  <rect x="380" y="250" width="300" height="110" rx="8" fill="#d1fae5" stroke="#42b883" stroke-width="1"/><text x="530" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#2d8a5e">✓ 解决方案</text><text x="400" y="306" font-size="12" fill="#333">· /compact 压缩对话历史</text><text x="400" y="328" font-size="12" fill="#333">· 一个对话专注一个任务</text><text x="400" y="350" font-size="12" fill="#333">· 感觉 AI 变笨就开新对话</text>
</svg>