<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42b883"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <text x="360" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Token 分词对比：中文 vs 英文</text>
  <rect x="20" y="60" width="680" height="115" rx="8" fill="#f0f9f4" stroke="#42b883" stroke-width="1.5"/>
  <text x="40" y="88" font-size="14" font-weight="700" fill="#42b883">英文</text>
  <text x="40" y="110" font-size="20" font-weight="600" fill="#333" letter-spacing="1">Artificial intelligence is changing the world</text>
  <rect x="40" y="122" width="72" height="30" rx="5" fill="#42b883" opacity="0.15"/><text x="76" y="142" text-anchor="middle" font-size="11" fill="#2d8a5e">Artificial</text>
  <rect x="118" y="122" width="66" height="30" rx="5" fill="#42b883" opacity="0.2"/><text x="151" y="142" text-anchor="middle" font-size="11" fill="#2d8a5e">intelligence</text>
  <rect x="190" y="122" width="26" height="30" rx="5" fill="#42b883" opacity="0.25"/><text x="203" y="142" text-anchor="middle" font-size="11" fill="#2d8a5e">is</text>
  <rect x="222" y="122" width="52" height="30" rx="5" fill="#42b883" opacity="0.3"/><text x="248" y="142" text-anchor="middle" font-size="11" fill="#2d8a5e">changing</text>
  <rect x="280" y="122" width="32" height="30" rx="5" fill="#42b883" opacity="0.35"/><text x="296" y="142" text-anchor="middle" font-size="11" fill="#2d8a5e">the</text>
  <rect x="318" y="122" width="48" height="30" rx="5" fill="#42b883" opacity="0.4"/><text x="342" y="142" text-anchor="middle" font-size="11" fill="#2d8a5e">world</text>
  <text x="380" y="142" font-size="14" font-weight="700" fill="#e74c3c">→ ~9 tokens</text>
  <rect x="20" y="190" width="680" height="100" rx="8" fill="#eef2ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="40" y="218" font-size="14" font-weight="700" fill="#3b82f6">中文</text>
  <text x="40" y="240" font-size="20" font-weight="600" fill="#333" letter-spacing="2">人工智能正在改变世界</text>
  <rect x="40" y="252" width="56" height="30" rx="5" fill="#3b82f6" opacity="0.15"/><text x="68" y="272" text-anchor="middle" font-size="11" fill="#1e5fbb">人工</text>
  <rect x="102" y="252" width="56" height="30" rx="5" fill="#3b82f6" opacity="0.22"/><text x="130" y="272" text-anchor="middle" font-size="11" fill="#1e5fbb">智能</text>
  <rect x="164" y="252" width="42" height="30" rx="5" fill="#3b82f6" opacity="0.3"/><text x="185" y="272" text-anchor="middle" font-size="11" fill="#1e5fbb">正在</text>
  <rect x="212" y="252" width="42" height="30" rx="5" fill="#3b82f6" opacity="0.37"/><text x="233" y="272" text-anchor="middle" font-size="11" fill="#1e5fbb">改变</text>
  <rect x="260" y="252" width="42" height="30" rx="5" fill="#3b82f6" opacity="0.45"/><text x="281" y="272" text-anchor="middle" font-size="11" fill="#1e5fbb">世界</text>
  <text x="318" y="272" font-size="14" font-weight="700" fill="#22c55e">→ ~5 tokens</text>
  <text x="360" y="322" text-anchor="middle" font-size="13" fill="#666">相同语义，中文 Token 数比英文少 30-50%，API 费用更低</text>
</svg>