<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="system-ui, -apple-system, sans-serif">
  <text x="360" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Temperature（温度）：控制 AI 输出的"创意度"</text>
  <rect x="50" y="55" width="620" height="16" rx="8" fill="#f1f5f9"/>
  <line x1="50" y1="72" x2="50" y2="82" stroke="#3b82f6" stroke-width="2"/><line x1="205" y1="72" x2="205" y2="82" stroke="#7c3aed" stroke-width="2"/><line x1="360" y1="72" x2="360" y2="82" stroke="#8b5cf6" stroke-width="2"/><line x1="515" y1="72" x2="515" y2="82" stroke="#f59e0b" stroke-width="2"/><line x1="670" y1="72" x2="670" y2="82" stroke="#ef4444" stroke-width="2"/>
  <text x="50" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#3b82f6">0.0</text><text x="205" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">0.3</text><text x="360" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#8b5cf6">0.5</text><text x="515" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#f59e0b">0.8</text><text x="670" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">1.0</text>
  <rect x="40" y="108" width="180" height="32" rx="5" fill="#3b82f6" opacity="0.1"/><text x="130" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#3b82f6">确定性输出</text>
  <rect x="310" y="108" width="100" height="32" rx="5" fill="#8b5cf6" opacity="0.1"/><text x="360" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#8b5cf6">均衡</text>
  <rect x="540" y="108" width="140" height="32" rx="5" fill="#ef4444" opacity="0.1"/><text x="610" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#ef4444">高创意</text>
  <rect x="30" y="160" width="310" height="120" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/><text x="185" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#3b82f6">Temperature 低 (0-0.3)</text><text x="50" y="214" font-size="12" fill="#444">→ 每次回答几乎一样</text><text x="50" y="234" font-size="12" fill="#444">→ 适合：写代码、翻译、数学计算</text><text x="50" y="258" font-size="12" fill="#444">→ 关键词：稳定、精确、可预测</text>
  <rect x="380" y="160" width="310" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/><text x="535" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#f59e0b">Temperature 高 (0.8-1.0)</text><text x="400" y="214" font-size="12" fill="#444">→ 每次回答都不同</text><text x="400" y="234" font-size="12" fill="#444">→ 适合：头脑风暴、起名字、创意写作</text><text x="400" y="258" font-size="12" fill="#444">→ 关键词：多样、探索、惊喜</text>
</svg>