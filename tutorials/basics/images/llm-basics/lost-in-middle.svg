<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <!-- palette -->
    <linearGradient id="gpt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c"/><stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="claude" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="llama" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="mpt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="sd"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="720" height="380" rx="10" fill="#0f172a"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">Lost in the Middle — 多文档 QA 中答案位置对模型性能的影响</text>
  <line x1="50" y1="42" x2="670" y2="42" stroke="#334155" stroke-width="1"/>

  <!-- Chart Area: x 70-670, y 60-280 -->
  <!-- Y-Axis -->
  <line x1="80" y1="55" x2="80" y2="285" stroke="#475569" stroke-width="1.5"/>
  <!-- X-Axis -->
  <line x1="80" y1="285" x2="680" y2="285" stroke="#475569" stroke-width="1.5"/>

  <!-- Y-Axis labels and gridlines -->
  <text x="70" y="68" text-anchor="end" font-size="10" fill="#94a3b8">0.80</text>
  <line x1="80" y1="65" x2="680" y2="65" stroke="#1e293b" stroke-width="1"/>

  <text x="70" y="121" text-anchor="end" font-size="10" fill="#94a3b8">0.70</text>
  <line x1="80" y1="118" x2="680" y2="118" stroke="#1e293b" stroke-width="1"/>

  <text x="70" y="174" text-anchor="end" font-size="10" fill="#94a3b8">0.60</text>
  <line x1="80" y1="171" x2="680" y2="171" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>

  <text x="70" y="227" text-anchor="end" font-size="10" fill="#94a3b8">0.50</text>
  <line x1="80" y1="224" x2="680" y2="224" stroke="#1e293b" stroke-width="1"/>

  <text x="70" y="280" text-anchor="end" font-size="10" fill="#94a3b8">0.40</text>
  <line x1="80" y1="277" x2="680" y2="277" stroke="#1e293b" stroke-width="1"/>

  <!-- Y-Axis title -->
  <text x="18" y="170" text-anchor="middle" font-size="11" fill="#94a3b8" transform="rotate(-90,18,170)">准确率 (Accuracy)</text>

  <!-- X-Axis position labels -->
  <text x="80" y="303" text-anchor="middle" font-size="10" fill="#64748b">1st</text>
  <text x="200" y="303" text-anchor="middle" font-size="10" fill="#64748b">5th</text>
  <text x="320" y="303" text-anchor="middle" font-size="10" fill="#64748b">10th</text>
  <text x="440" y="303" text-anchor="middle" font-size="10" fill="#64748b">15th</text>
  <text x="560" y="303" text-anchor="middle" font-size="10" fill="#64748b">20th</text>
  <text x="380" y="322" text-anchor="middle" font-size="11" fill="#64748b">答案文档在上下文中的位置 (Document Position)</text>

  <!-- Shaded area highlighting "lost in the middle" -->
  <rect x="204" y="65" width="260" height="212" rx="4" fill="#ef4444" opacity="0.04"/>

  <!-- GPT-3.5-Turbo points & line (red) -->
  <polyline points="80,83 156,89 220,110 275,141 328,163 368,175 415,181 464,178 520,153 560,130 620,100 660,90 676,86"
            fill="none" stroke="#e74c3c" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="80" cy="83" r="4" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
  <circle cx="156" cy="89" r="4" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
  <circle cx="220" cy="110" r="4" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
  <circle cx="275" cy="141" r="4" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
  <circle cx="328" cy="163" r="4" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
  <circle cx="368" cy="175" r="4" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
  <circle cx="415" cy="181" r="4" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
  <circle cx="464" cy="178" r="4" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
  <circle cx="520" cy="153" r="4" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
  <circle cx="560" cy="130" r="4" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
  <circle cx="620" cy="100" r="4" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
  <circle cx="660" cy="90" r="4" fill="#e74c3c" stroke="#fff" stroke-width="1"/>
  <circle cx="676" cy="86" r="4" fill="#e74c3c" stroke="#fff" stroke-width="1"/>

  <!-- Claude line (purple) -->
  <polyline points="80,93 156,102 220,136 275,168 328,186 368,195 415,198 464,195 520,170 560,145 620,112 660,101 676,96"
            fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 3"/>
  <circle cx="368" cy="195" r="3" fill="#8b5cf6"/>
  <circle cx="415" cy="198" r="3" fill="#8b5cf6"/>
  <circle cx="464" cy="195" r="3" fill="#8b5cf6"/>
  <circle cx="80" cy="93" r="3" fill="#8b5cf6"/>
  <circle cx="676" cy="96" r="3" fill="#8b5cf6"/>
  <circle cx="328" cy="186" r="3" fill="#8b5cf6"/>
  <circle cx="520" cy="170" r="3" fill="#8b5cf6"/>

  <!-- Closed-book baseline -->
  <line x1="80" y1="241" x2="676" y2="241" stroke="#475569" stroke-width="1.2" stroke-dasharray="8 4"/>
  <text x="550" y="236" font-size="9" fill="#64748b">无文档基线 (Closed-Book ~0.56)</text>

  <!-- Legend -->
  <rect x="95" y="340" width="10" height="10" rx="2" fill="#e74c3c"/>
  <text x="110" y="349" font-size="10" fill="#94a3b8">GPT-3.5-Turbo-0613</text>

  <rect x="255" y="340" width="10" height="10" rx="2" fill="#8b5cf6"/>
  <text x="270" y="349" font-size="10" fill="#94a3b8">Claude-1.3 / LongChat-13B</text>

  <line x1="460" y1="345" x2="488" y2="345" stroke="#475569" stroke-width="1" stroke-dasharray="8 4"/>
  <text x="495" y="349" font-size="10" fill="#94a3b8">No-Doc Baseline</text>

  <!-- Citation -->
  <text x="360" y="372" text-anchor="middle" font-size="9" fill="#475569">Liu et al., "Lost in the Middle: How Language Models Use Long Contexts", TACL 2024 (arXiv:2307.03172)</text>
</svg>