<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 486" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.06"/></filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafcfc"/><stop offset="100%" stop-color="#f1f4f7"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="760" height="520" rx="12" fill="url(#bg)"/>

  <!-- 标题 -->
  <text x="380" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">模型路由策略与提供商对比</text>

  <!-- 表头：Claude 列 -->
  <rect x="24" y="48" width="352" height="26" rx="6" fill="#1a1a2e"/>
  <text x="200" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Anthropic Claude</text>

  <!-- 表头：DeepSeek 列 -->
  <rect x="384" y="48" width="352" height="26" rx="6" fill="#1a1a2e"/>
  <text x="560" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">DeepSeek</text>

  <!-- 分隔竖线（视觉） -->
  <line x1="380" y1="48" x2="380" y2="425" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ======== 第一级：轻量 ======== -->
  <!-- 区间标签 -->
  <rect x="10" y="86" width="14" height="80" rx="4" fill="#4ade80"/>
  <text x="7" y="136" text-anchor="middle" font-size="9" fill="#166534" transform="rotate(-90, 7, 136)">第 1 级</text>

  <!-- Haiku -->
  <rect x="30" y="90" width="340" height="72" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="90" width="80" height="72" rx="8" fill="#dcfce7"/>
  <text x="70" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Haiku</text>
  <text x="70" y="140" text-anchor="middle" font-size="9" fill="#15803d">⚡ 快刀手</text>
  <text x="125" y="112" font-size="9" fill="#94a3b8">调用场景</text>
  <text x="125" y="130" font-size="10" fill="#334155">代码补全 · 格式化 · 简单问答</text>
  <text x="125" y="148" font-size="9" fill="#64748b">⏱ 最快最省，秒级响应</text>

  <!-- DeepSeek-V4-Flash -->
  <rect x="390" y="90" width="340" height="72" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="390" y="90" width="80" height="72" rx="8" fill="#fef9c3"/>
  <text x="430" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#854d0e">V4-Flash</text>
  <text x="430" y="140" text-anchor="middle" font-size="9" fill="#a16207">⚡ 快速版</text>
  <text x="485" y="112" font-size="9" fill="#94a3b8">调用场景</text>
  <text x="485" y="130" font-size="10" fill="#334155">代码补全 · 格式化 · 简单问答</text>
  <text x="485" y="148" font-size="9" fill="#64748b">⏱ 极速响应，低延迟</text>

  <!-- 箭头 -->
  <polygon points="200,166 210,176 190,176" fill="#cbd5e1"/>
  <line x1="200" y1="166" x2="200" y2="172" stroke="#cbd5e1" stroke-width="2"/>
  <text x="215" y="176" font-size="9" fill="#94a3b8">任务变复杂 ▸</text>
  <polygon points="560,166 570,176 550,176" fill="#cbd5e1"/>
  <line x1="560" y1="166" x2="560" y2="172" stroke="#cbd5e1" stroke-width="2"/>
  <text x="575" y="176" font-size="9" fill="#94a3b8">任务变复杂 ▸</text>

  <!-- ======== 第二级：主力 ======== -->
  <rect x="10" y="190" width="14" height="80" rx="4" fill="#60a5fa"/>
  <text x="7" y="240" text-anchor="middle" font-size="9" fill="#1e40af" transform="rotate(-90, 7, 240)">第 2 级</text>

  <!-- Sonnet -->
  <rect x="30" y="194" width="340" height="72" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="194" width="80" height="72" rx="8" fill="#dbeafe"/>
  <text x="70" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Sonnet</text>
  <text x="70" y="244" text-anchor="middle" font-size="9" fill="#1d4ed8">🚀 主力 · 90%</text>
  <text x="125" y="216" font-size="9" fill="#94a3b8">调用场景</text>
  <text x="125" y="234" font-size="10" fill="#334155">日常编码 · 代码审查 · 重构</text>
  <text x="125" y="252" font-size="9" fill="#64748b">⚖ 速度与质量最佳平衡</text>

  <!-- DeepSeek-V4 -->
  <rect x="390" y="194" width="340" height="72" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="390" y="194" width="80" height="72" rx="8" fill="#ffedd5"/>
  <text x="430" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="#c2410c">V4-Pro</text>
  <text x="430" y="244" text-anchor="middle" font-size="9" fill="#ea580c">🌐 主力模型</text>
  <text x="485" y="216" font-size="9" fill="#94a3b8">调用场景</text>
  <text x="485" y="234" font-size="10" fill="#334155">日常编码 · 代码审查 · 架构</text>
  <text x="485" y="252" font-size="9" fill="#64748b">🌍 1.6T MoE 深度推理能力</text>

  <!-- 箭头 -->
  <polygon points="200,270 210,280 190,280" fill="#cbd5e1"/>
  <line x1="200" y1="270" x2="200" y2="276" stroke="#cbd5e1" stroke-width="2"/>
  <text x="215" y="280" font-size="9" fill="#94a3b8">搞不定 ▸</text>
  <polygon points="560,270 570,280 550,280" fill="#cbd5e1"/>
  <line x1="560" y1="270" x2="560" y2="276" stroke="#cbd5e1" stroke-width="2"/>
  <text x="575" y="280" font-size="9" fill="#94a3b8">搞不定 ▸</text>

  <!-- ======== 第三级：专家级 ======== -->
  <rect x="10" y="294" width="14" height="80" rx="4" fill="#a78bfa"/>
  <text x="7" y="344" text-anchor="middle" font-size="9" fill="#5b21b6" transform="rotate(-90, 7, 344)">第 3 级</text>

  <!-- Opus -->
  <rect x="30" y="298" width="340" height="72" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="298" width="80" height="72" rx="8" fill="#ede9fe"/>
  <text x="70" y="328" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Opus</text>
  <text x="70" y="348" text-anchor="middle" font-size="9" fill="#6d28d9">🧠 专家号</text>
  <text x="125" y="320" font-size="9" fill="#94a3b8">调用场景</text>
  <text x="125" y="338" font-size="10" fill="#334155">复杂架构 · 大型重构 · 数学推理</text>
  <text x="125" y="356" font-size="9" fill="#64748b">🔍 最强推理，慢但精准</text>

  <!-- DeepSeek 第三级：同一级空置或标注 -->
  <rect x="390" y="298" width="340" height="72" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)"/>
  <rect x="390" y="298" width="80" height="72" rx="8" fill="#f1f5f9"/>
  <text x="430" y="328" text-anchor="middle" font-size="13" font-weight="700" fill="#64748b">V4-Pro</text>
  <text x="430" y="348" text-anchor="middle" font-size="9" fill="#94a3b8">🧠 已含</text>
  <text x="485" y="325" font-size="10" fill="#64748b" font-style="italic">V4-Pro 主力模型已具备</text>
  <text x="485" y="345" font-size="10" fill="#64748b" font-style="italic">Opus 级别的推理能力</text>
  <text x="485" y="362" font-size="9" fill="#94a3b8">通过 /model 切换即可调用</text>

  <!-- 底部提示 -->
  <rect x="140" y="398" width="480" height="28" rx="14" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="380" y="417" text-anchor="middle" font-size="11" fill="#475569">核心原则：先用 Flash 试，搞不定了再升级到主力模型</text>

  <!-- Provider 切换 tip -->
  <rect x="200" y="444" width="360" height="22" rx="4" fill="#fefce8" stroke="#fde047" stroke-width="1"/>
  <text x="380" y="460" text-anchor="middle" font-size="9" fill="#854d0e">💡 Claude 与 DeepSeek 可通过 CC Switch 热切换，无需重启</text>
</svg>